services:
  api:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - pipeline_data:/data
    environment:
      DATABASE_URL: postgresql://pipeline:pipeline@db/pipeline
      REDIS_URL: redis://redis:6379/0
    command: python app.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    volumes:
      - pipeline_data:/data
    environment:
      DATABASE_URL: postgresql://pipeline:pipeline@db/pipeline
      REDIS_URL: redis://redis:6379/0
    command: python worker.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pipeline_data:
